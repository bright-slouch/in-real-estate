      primary: true

  septic:
    - name: "[Company]"
      phone: "([XXX]) [XXX]-[XXXX]"
      specialty: "Septic inspection, pumping, repair — for rural properties"
      primary: true

  well:
    - name: "[Company]"
      phone: "([XXX]) [XXX]-[XXXX]"
